name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify_codebase:
    name: Verify Codebase

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 20.x, 22.x, 24.x ]

    permissions:
      statuses: write
      checks: write
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
      - name: Use Bun
        uses: oven-sh/setup-bun@v2
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false
      - name: Install the project dependencies
        run: bun install --frozen-lockfile
      - name: Lint the code
        run: bun run lint:check
      - name: Check code formatting
        run: bun run format:check
      - name: Check exports
        run: bun run check-exports
      - name: Build
        run: bun run build:check
      - name: Run tests
        run: bun vitest run --coverage --reporter=default --reporter=junit
          --outputFile=./junit.xml
      - name: Upload test result artifact
        uses: actions/upload-artifact@v7
        with:
          name: test-results-report-${{ matrix.node-version }}
          path: junit.xml
      - name: Upload test coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: test-coverage-report-${{ matrix.node-version }}
          path: coverage/**/*
      - name: Report unit test results
        uses: dorny/test-reporter@v3
        if: success() || failure()
        with:
          name: Test results (Node.js ${{ matrix.node-version}})
          path: junit.xml
          reporter: jest-junit
